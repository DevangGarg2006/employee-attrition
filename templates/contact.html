<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - HireMind AI</title>
</head>
<body style="margin:0; font-family:Arial, Helvetica, sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:white;">

<!-- Navbar -->
<div style="display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:#0f172a;">
    <h2 style="margin:0; color:#38bdf8;">HireMind AI</h2>
    <div>
        <a href="/" style="color:white; text-decoration:none; margin-right:20px;">Home</a>
        <a href="/predict" style="color:white; text-decoration:none; margin-right:20px;">Predict</a>
        <a href="/about" style="color:white; text-decoration:none;">About</a>
    </div>
</div>

<!-- Contact Section -->
<div style="max-width:600px; margin:80px auto; padding:40px; background:rgba(255,255,255,0.05); border-radius:15px; backdrop-filter:blur(10px); box-shadow:0 0 30px rgba(0,0,0,0.3);">

    <h2 style="text-align:center; color:#38bdf8;">Get in Touch</h2>

    <form style="display:grid; gap:15px; margin-top:30px;">

        <input type="text" placeholder="Your Name" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="email" placeholder="Your Email" required
            style="padding:12px; border:none; border-radius:8px;">

        <textarea placeholder="Your Message" rows="4" required
            style="padding:12px; border:none; border-radius:8px;"></textarea>

        <button type="submit"
            style="padding:14px; background:#38bdf8; color:#0f172a; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">
            Send Message
        </button>

    </form>

</div>

<div style="text-align:center; padding:20px; background:#0f172a; color:#94a3b8;">
    © 2026 HireMind AI
</div>

</body>
</html>
