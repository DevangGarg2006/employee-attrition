<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict | HireMind AI</title>
</head>

<body style="margin:0; font-family:Arial, Helvetica, sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:white;">

<!-- Navbar -->
<div style="display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:#0f172a;">
    <h2 style="margin:0; color:#38bdf8;">HireMind AI</h2>
    <div>
        <a href="/" style="color:white; text-decoration:none; margin-right:20px;">Home</a>
        <a href="/about" style="color:white; text-decoration:none; margin-right:20px;">About</a>
        <a href="/contact" style="color:white; text-decoration:none;">Contact</a>
    </div>
</div>

<!-- Main Section -->
<div style="max-width:800px; margin:60px auto; padding:40px; background:rgba(255,255,255,0.05); border-radius:15px; backdrop-filter:blur(10px); box-shadow:0 0 30px rgba(0,0,0,0.3);">

    <h1 style="text-align:center; color:#38bdf8; margin-bottom:30px;">
        Employee Attrition Risk Prediction
    </h1>

    <form method="POST" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">

        <input type="number" name="Age" placeholder="Age" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="DailyRate" placeholder="Daily Rate" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="DistanceFromHome" placeholder="Distance From Home" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="Education" placeholder="Education Level (1-5)" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="MonthlyIncome" placeholder="Monthly Income" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="NumCompaniesWorked" placeholder="Number of Companies Worked" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="PercentSalaryHike" placeholder="Percent Salary Hike" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="TotalWorkingYears" placeholder="Total Working Years" required
            style="padding:12px; border:none; border-radius:8px;">

        <input type="number" name="YearsAtCompany" placeholder="Years At Company" required
            style="padding:12px; border:none; border-radius:8px;">

        <!-- Button Full Width -->
        <div style="grid-column:span 2; text-align:center; margin-top:20px;">
            <button type="submit"
                style="padding:14px 40px; background:#38bdf8; color:#0f172a; font-weight:bold; border:none; border-radius:8px; cursor:pointer; font-size:16px;">
                Predict Risk
            </button>
        </div>

    </form>

    <!-- Prediction Output -->
    {% if prediction %}
    <div style="margin-top:40px; padding:25px; background:#0f172a; border-radius:12px; text-align:center; box-shadow:0 0 20px rgba(56,189,248,0.4);">

        <h2 style="color:#38bdf8;">Prediction Result</h2>

        <p style="font-size:20px; margin-top:10px;">
            Risk Level:
            <strong>
                {{ prediction }}
            </strong>
        </p>

        <p style="font-size:18px;">
            Probability: {{ probability }}%
        </p>

    </div>
    {% endif %}

</div>

<!-- Footer -->
<div style="text-align:center; padding:20px; background:#0f172a; color:#94a3b8;">
    © 2026 HireMind AI | Intelligent Workforce Analytics
</div>

</body>
</html>
